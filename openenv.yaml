name: code-review-env
description: >
  A pull request code review environment where an agent observes unified diffs,
  identifies bugs and security issues, and decides whether to approve or request changes.
  Scored deterministically by a severity-weighted grader with partial credit.
version: "1.0.0"
api_url: "https://mohiee661-ai-code-reviewer.hf.space"
tasks:
  - id: easy
    description: "Off-by-one logic bugs in a single Python utility file."
  - id: medium
    description: "Inefficient full-table-scan DB queries and missing pagination in a Flask API."
  - id: hard
    description: "SQL injection + hardcoded JWT secret fallback spanning two files (multi-file reasoning required)."
